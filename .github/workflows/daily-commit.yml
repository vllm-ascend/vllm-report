name: Daily Commit Fetch

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch vllm commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_commits.py --repo vllm-project/vllm --branch main

      - name: Fetch vllm-ascend commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_commits.py --repo vllm-project/vllm-ascend --branch main

      - name: Analyze vllm commits
        if: ${{ vars.ENABLE_AI_ANALYSIS == 'true' }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: python scripts/analyze_commits.py --repo vllm-project/vllm --catch-up

      - name: Analyze vllm-ascend commits
        if: ${{ vars.ENABLE_AI_ANALYSIS == 'true' }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: python scripts/analyze_commits.py --repo vllm-project/vllm-ascend --catch-up

      - name: Update architecture context (weekly)
        if: ${{ vars.ENABLE_AI_ANALYSIS == 'true' }}
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          DAY_OF_WEEK=$(TZ=Asia/Shanghai date +%u)
          if [ "$DAY_OF_WEEK" = "1" ]; then
            python scripts/generate_context.py --repo vllm-project/vllm --force
            python scripts/generate_context.py --repo vllm-project/vllm-ascend --force
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update commit data $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          git push
