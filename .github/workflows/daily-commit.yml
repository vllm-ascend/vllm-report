name: Daily Commit Fetch & Analyze

on:
  schedule:
    # 北京时间凌晨 2:00 = UTC 18:00 (前一日)
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fetch-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Opencode
        run: npm install -g opencode-cli

      - name: Configure Opencode (DeepSeek provider)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p ~/.config/opencode
          cat > ~/.config/opencode/opencode.jsonc << EOF
          {
            "model": "deepseek/deepseek-v4-flash",
            "provider": {
              "deepseek": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "DeepSeek",
                "options": {
                  "baseURL": "https://api.deepseek.com",
                  "apiKey": "${DEEPSEEK_API_KEY}"
                },
                "models": {
                  "deepseek-v4-flash": {}
                }
              }
            }
          }
          EOF

      - name: Compute today date (CST)
        id: date
        run: echo "date=$(TZ=Asia/Shanghai date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Fetch vllm commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_commits.py --repo vllm-project/vllm --branch main --api-only

      - name: Analyze vllm commits
        run: |
          if [ -f "data/vllm/commits/${{ steps.date.outputs.date }}.json" ]; then
            python scripts/analyze_commits.py \
              --repo vllm-project/vllm \
              --date "${{ steps.date.outputs.date }}" \
              --model deepseek/deepseek-v4-flash \
              --force
          else
            echo "No commit data for ${{ steps.date.outputs.date }}, skipping analysis"
          fi

      - name: Fetch vllm-ascend commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_commits.py --repo vllm-project/vllm-ascend --branch main --api-only

      - name: Analyze vllm-ascend commits
        run: |
          if [ -f "data/vllm-ascend/commits/${{ steps.date.outputs.date }}.json" ]; then
            python scripts/analyze_commits.py \
              --repo vllm-project/vllm-ascend \
              --date "${{ steps.date.outputs.date }}" \
              --model deepseek/deepseek-v4-flash \
              --force
          else
            echo "No commit data for ${{ steps.date.outputs.date }}, skipping analysis"
          fi

      - name: Update analysis index
        run: python scripts/update_analysis_index.py

      - name: Clean stale data (commits without analysis)
        run: python scripts/clean_stale_data.py

      - name: Send email report
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/send_report.py "${{ steps.date.outputs.date }}"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || ( \
            git commit -m "chore: update data $(TZ=Asia/Shanghai date +%Y-%m-%d)" && \
            git push \
          )

      - name: Trigger Pages deployment
        if: ${{ ! cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run Deploy\ GitHub\ Pages
