name: Weekly Architecture Context

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday 00:00 UTC = 08:00 CST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Reasonix
        run: npm install -g reasonix

      - name: Generate vllm architecture context
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate_context.py --repo vllm-project/vllm --force

      - name: Generate vllm-ascend architecture context
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate_context.py --repo vllm-project/vllm-ascend --force

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update architecture context $(TZ=Asia/Shanghai date +%Y-%m-%d)" && git push
