name: Weekly Architecture Context

on:
  schedule:
    - cron: '0 0 * * 1'  # Monday 00:00 UTC = 08:00 CST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate vllm architecture context
        env:
          LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate_context.py --repo vllm-project/vllm --force

      - name: Generate vllm-ascend architecture context
        env:
          LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate_context.py --repo vllm-project/vllm-ascend --force

      - name: Cross-reference vllm vs vllm-ascend
        env:
          LLM_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/generate_context.py --cross-reference --force

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: update architecture context $(TZ=Asia/Shanghai date +%Y-%m-%d)" && git push)
